model: gemma4:e4b            # subject = local OSS model (non-quota, free)
oss_local_provider: ollama   # route subject via `codex exec --oss --local-provider ollama`
judge_model: gpt-5.5         # independent judge (cloud, ample quota)
n_per_subset: null           # same fresh 32-question set
R: 3                         # full power restored (local subject is non-quota)
